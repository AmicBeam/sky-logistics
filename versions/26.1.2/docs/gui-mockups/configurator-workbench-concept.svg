<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1824"/>
      <stop offset="0.52" stop-color="#132b39"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101f28" stop-opacity=".97"/>
      <stop offset="1" stop-color="#09151c" stop-opacity=".98"/>
    </linearGradient>
    <linearGradient id="selected" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#173f4b"/>
      <stop offset="1" stop-color="#102a34"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text { font-family: "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #d7e5e9; }
      .pixel { shape-rendering: crispEdges; }
      .title { font-size: 18px; font-weight: 600; fill: #ffe78e; }
      .h2 { font-size: 13px; font-weight: 600; fill: #e9f3f4; }
      .body { font-size: 12px; fill: #c8dadd; }
      .small { font-size: 10px; fill: #88a5aa; }
      .tiny { font-size: 9px; fill: #718d93; }
      .cyan { fill: #72e8f2; }
      .gold { fill: #ffd66e; }
      .green { fill: #71e0a4; }
      .red { fill: #ff8c83; }
      .muted { fill: #75939a; }
      .panel-stroke { stroke: #28505a; stroke-width: 1; }
      .fine { stroke: #203d45; stroke-width: 1; }
      .button { fill: #132832; stroke: #356572; stroke-width: 1; }
      .button-hi { fill: #18404b; stroke: #67dbe6; stroke-width: 1; }
      .chip { fill: #142d35; stroke: #2d5660; stroke-width: 1; }
    </style>
  </defs>

  <!-- Dimmed in-world backdrop -->
  <rect width="960" height="600" fill="url(#sky)"/>
  <g opacity=".22" class="pixel">
    <rect x="0" y="420" width="960" height="180" fill="#173226"/>
    <rect x="0" y="470" width="240" height="130" fill="#254534"/>
    <rect x="120" y="380" width="90" height="220" fill="#254534"/>
    <rect x="730" y="390" width="230" height="210" fill="#1f3b2e"/>
    <rect x="790" y="330" width="96" height="270" fill="#294a38"/>
    <rect x="36" y="270" width="180" height="150" fill="#122731"/>
    <rect x="742" y="245" width="180" height="145" fill="#122731"/>
    <rect x="418" y="104" width="9" height="330" fill="#6fd9e5"/>
    <rect x="427" y="104" width="4" height="330" fill="#d8ffff"/>
  </g>
  <rect width="960" height="600" fill="#02090d" opacity=".36"/>

  <!-- Main workbench -->
